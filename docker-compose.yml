# DevBoard — one-command local stack: Postgres + API server + web client.
#   cp .env.example .env && docker compose up --build
services:
  postgres:
    image: postgres:16-alpine
    container_name: devboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devboard}
      POSTGRES_DB: ${POSTGRES_DB:-devboard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - devboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devboard} -d ${POSTGRES_DB:-devboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: devboard-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      SERVER_PORT: 4000
      # Inside the compose network the DB host is the service name "postgres".
      DATABASE_URL: postgresql://${POSTGRES_USER:-devboard}:${POSTGRES_PASSWORD:-devboard}@postgres:5432/${POSTGRES_DB:-devboard}?schema=public
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "4000:4000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:4000}
    container_name: devboard-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  devboard_pgdata:
